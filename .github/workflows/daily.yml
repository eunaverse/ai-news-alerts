name: Daily AI Trend Brief

on:
  schedule:
    # GitHub Actions cron is UTC. 21:00 UTC is 06:00 KST.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without sending Slack alerts or persisting seen news
        type: choice
        required: true
        default: "true"
        options:
          - "true"
          - "false"
      date:
        description: "Optional KST date override, e.g. 2026-05-06"
        required: false
        type: string

permissions:
  contents: write

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    env:
      TIMEZONE: Asia/Seoul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Run daily AI trend brief
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          AI_NEWS_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          DATE_ARG=""
          if [ -n "$AI_NEWS_DATE" ]; then
            DATE_ARG="--date $AI_NEWS_DATE"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            ai-news-alerts --dry-run $DATE_ARG
          else
            ai-news-alerts $DATE_ARG
          fi

      - name: Persist seen news
        if: github.event_name == 'schedule' || inputs.dry_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist seen news"
            git push
          fi
